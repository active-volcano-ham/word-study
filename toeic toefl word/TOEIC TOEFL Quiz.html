<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>영단어 풍선 퀴즈 (TOEIC/TOEFL)</title>
  <meta name="theme-color" content="#9fe7f6" />
  <meta name="description" content="TOEIC/TOEFL 단어 풍선 퀴즈 게임" />
  <!-- PWA 최소 매니페스트를 인라인 -->
  <link rel="manifest" href="data:application/manifest+json,{&quot;name&quot;:%22Balloon%20Vocab%20Quiz%22,&quot;short_name&quot;:%22VocabQuiz%22,&quot;display&quot;:%22standalone&quot;,&quot;background_color&quot;:%22#9fe7f680%22,&quot;theme_color&quot;:%22#9fe7f6&quot;}" />

  <style>
    :root{
      --bg: rgba(202,247,252,0.5);
      --text: #103445;
      --panel: #ffffffcc;
      --panel-border: #7fcfe0;
      --correct: #16a34a;
      --wrong: #dc2626;
      --shadow: 0 6px 18px rgba(0,0,0,0.12);
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:ui-sans-serif,system-ui,Segoe UI,Apple SD Gothic Neo,Malgun Gothic,Arial}
    body{
      background: var(--bg);
      color: var(--text);
      overflow:hidden;
    }
    header{
      position:fixed; top:0; left:0; right:0;
      background: var(--panel);
      border-bottom: 1px solid var(--panel-border);
      backdrop-filter: blur(6px);
      display:flex; align-items:center; gap:16px; padding:10px 14px; z-index:10;
    }
    .brand{font-weight:700}
    .controls{
      display:flex; flex-wrap:wrap; gap:10px; align-items:center;
    }
    .controls select, .controls button, .controls .toggle{
      border:1px solid #7fcfe0; background:#fff; padding:6px 10px; border-radius:8px; box-shadow: var(--shadow);
    }
    .controls .toggle{
      display:flex; gap:6px; align-items:center; background:#f7fdff;
    }
    .score{
      margin-left:auto; font-weight:700; padding:6px 10px; border-radius:8px; background:#ffffff; border:1px solid #bee3ef; box-shadow: var(--shadow);
    }
    .question{
      position:fixed; top:64px; left:50%; transform:translateX(-50%);
      background:#fff; border:1px solid #bee3ef; border-radius:12px; padding:10px 16px;
      font-size:20px; font-weight:700; box-shadow: var(--shadow); z-index:9;
      max-width: min(90vw, 800px); text-align:center;
    }
    .game-area{
      position:absolute; inset:0; top:120px; overflow:hidden;
    }
    .balloon{
      position:absolute; top:-120px;
      width:140px; height:140px; border-radius:50%;
      display:flex; align-items:center; justify-content:center; text-align:center;
      color:#123; font-weight:700; padding:10px;
      border:2px solid rgba(0,0,0,0.06);
      cursor:pointer; user-select:none;
      transition: transform 0.1s ease-out;
      box-shadow: 0 10px 20px rgba(0,0,0,0.12), inset 0 0 40px rgba(255,255,255,0.45);
    }
    .balloon:after{
      content:"";
      position:absolute; bottom:-18px; left:50%; transform:translateX(-50%);
      width:0; height:0; border-left:8px solid transparent; border-right:8px solid transparent; border-top:18px solid rgba(0,0,0,0.08);
      filter:blur(0.2px);
    }
    .floating{ animation: floatY linear forwards; }
    @keyframes floatY{
      from{ transform: translateY(0); }
      to{ transform: translateY(120vh); }
    }
    .pop{
      animation: pop 220ms ease-out forwards;
    }
    @keyframes pop{
      0%{ transform: scale(1); opacity:1}
      60%{ transform: scale(1.15); opacity:0.8}
      100%{ transform: scale(0.3); opacity:0}
    }
    .toast{
      position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
      background:#fff; border:1px solid #bee3ef; padding:8px 12px; border-radius:8px;
      box-shadow: var(--shadow); z-index:15; font-weight:700;
      display:none;
    }
    .toast.show{ display:block; }
    .legend{
      position:fixed; bottom:10px; right:10px; font-size:12px; opacity:0.8;
      background:#ffffffcc; border:1px solid #bee3ef; border-radius:8px; padding:6px 8px;
    }
    .small{ font-size:12px; opacity:0.85 }
    .muted{ opacity:0.7 }
    .btn{ cursor:pointer }
    .btn:disabled{ opacity:0.55; cursor:not-allowed }
  </style>
</head>
<body>
  <header>
    <div class="brand">영단어 풍선 퀴즈</div>
    <div class="controls">
      <label>카테고리
        <select id="category">
          <option value="TOEIC">TOEIC</option>
          <option value="TOEFL">TOEFL</option>
        </select>
      </label>

      <div class="toggle" title="문제 방향">
        <label><input type="radio" name="direction" value="en2ko" checked> 영어 → 한국어</label>
        <label><input type="radio" name="direction" value="ko2en"> 한국어 → 영어</label>
      </div>

      <button id="startBtn" class="btn">시작</button>
      <button id="stopBtn" class="btn" disabled>정지</button>
    </div>

    <div class="score">점수: <span id="score">0</span></div>
  </header>

  <div class="question" id="question">상단에서 옵션을 선택하고 시작을 누르세요.</div>

  <div class="game-area" id="gameArea" aria-live="polite"></div>

  <div class="toast" id="toast"></div>

  <div class="legend small muted">맞추면 +10, 오답 -10. 풍선 클릭으로 답 선택. 파일은 깃허브 raw에서 로드.</div>

  <script>
    // 설정
    const RAW_BASE = "[raw.githubusercontent.com](https://raw.githubusercontent.com/active-volcano-ham/kids-typing-game/refs/heads/main/)";
    // 예상 파일 경로/이름: "TOEIC word.txt", "TOEFL word.txt"
    const FILES = {
      TOEIC: "TOEIC%20word.txt",
      TOEFL: "TOEFL%20word.txt"
    };

    // 풍선 색상 팔레트 (사용자 지정)
    const BALLOON_COLORS = [
      "#ffb3b3", "#ffc6b3", "#ffd9b3", "#ffecb3", "#ffffb3", "#ecffb3",
      "#d9ffb3", "#c6ffb3", "#b3ffb3", "#b3ffc6", "#b3ffd9", "#b3ffec",
      "#b3ffff", "#b3ecff", "#b3d9ff", "#b3c6ff", "#b3b3ff", "#c6b3ff",
      "#d9b3ff", "#ecb3ff", "#ffb3ff", "#ffb3ec", "#ffb3d9", "#ffb3c6", "#ffb3b3"
    ];

    // DOM
    const categoryEl = document.getElementById('category');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const gameArea = document.getElementById('gameArea');
    const questionEl = document.getElementById('question');
    const scoreEl = document.getElementById('score');
    const toastEl = document.getElementById('toast');

    // 상태
    let dictionary = [];     // [{en, ko}]
    let direction = "en2ko"; // 문제 방향
    let score = 0;
    let running = false;
    let spawnTimer = null;
    let currentPrompt = null; // {en, ko}
    let balloons = new Set();

    // 유틸
    const showToast = (msg, color) => {
      toastEl.textContent = msg;
      toastEl.style.borderColor = color || "#bee3ef";
      toastEl.classList.add('show');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(()=>toastEl.classList.remove('show'), 900);
    };

    const randInt = (min, max) => Math.floor(Math.random()*(max-min+1))+min;
    const choice = (arr) => arr.length ? arr[Math.floor(Math.random()*arr.length)] : undefined;
    const shuffle = (arr) => {
      const a = arr.slice();
      for(let i=a.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [a[i],a[j]]=[a[j],a[i]];
      }
      return a;
    };

    // 파일 파서: "영어,한국어" | "영어 - 한국어" | "영어\t한국어" 지원
    function parseEntry(line){
      const raw = line.trim();
      if(!raw) return null;
      // 주석/헤더 무시 가능
      if(raw.startsWith("#")) return null;

      let sep;
      if(raw.includes(",")) sep = ",";
      else if(raw.includes("\t")) sep = "\t";
      else if(raw.includes(" - ")) sep = " - ";
      else if(raw.includes(":" )) sep = ":";
      else return null;

      const [left, right] = raw.split(sep).map(s=>s.trim());
      if(!left || !right) return null;

      // 영어/한국어 판별 대략
      const isKorean = s => /[가-힣]/.test(s);
      let en, ko;
      if(isKorean(left) && !isKorean(right)){
        en = right; ko = left;
      }else if(isKorean(right) && !isKorean(left)){
        en = left; ko = right;
      }else{
        // 애매할 때는 좌=영어, 우=한국어로 가정
        en = left; ko = right;
      }
      return { en, ko };
    }

    async function loadCategory(cat){
      const url = RAW_BASE + FILES[cat];
      const res = await fetch(url, {cache:"no-store"});
      if(!res.ok){
        throw new Error("단어 파일을 불러오지 못했습니다: " + res.status);
      }
      const text = await res.text();
      const lines = text.split(/\r?\n/);
      const entries = [];
      for(const line of lines){
        const e = parseEntry(line);
        if(e && e.en && e.ko) entries.push(e);
      }
      // 중복 제거
      const seen = new Set();
      const uniq = [];
      for(const e of entries){
        const k = (e.en+"|"+e.ko).toLowerCase();
        if(!seen.has(k)){ seen.add(k); uniq.push(e); }
      }
      return uniq;
    }

    // 문제 갱신: 상단에 제시어 업데이트
    function setPrompt(){
      if(!dictionary.length) return null;
      currentPrompt = choice(dictionary);
      if(!currentPrompt) return null;

      if(direction === "en2ko"){
        questionEl.textContent = currentPrompt.en + " → ?";
      }else{
        questionEl.textContent = currentPrompt.ko + " → ?";
      }
      return currentPrompt;
    }

    // 풍선 생성
    function spawnBalloon(){
      if(!running || !currentPrompt) return;

      // 정답 여부를 확률적으로 분배 (정답 1/3 정도)
      const isCorrect = Math.random() < 0.34;
      let text, payload;
      if(isCorrect){
        text = (direction === "en2ko") ? currentPrompt.ko : currentPrompt.en;
        payload = { correct: true, display: text, reveal: text };
      }else{
        // 오답 단어 하나
        let wrong = choice(dictionary);
        // 현재 정답과 겹치지 않게 몇 번 시도
        for(let i=0;i<5 && wrong && wrong.en===currentPrompt.en && wrong.ko===currentPrompt.ko;i++){
          wrong = choice(dictionary);
        }
        if(!wrong) wrong = currentPrompt; // 막다른 경우
        text = (direction === "en2ko") ? wrong.ko : wrong.en;

        // 오답 클릭 시 한국어(영어) 노출: "정답 방향의 반대 언어"가 아니라, 문제의 반대편 언어를 보여준다.
        // 문제 제시가 en이면 풍선에 적힌 건 ko, 오답 클릭 시 그 ko에 대응하는 en을 보여준다(또는 반대).
        const reveal = (direction === "en2ko") ? wrong.en : wrong.ko;
        payload = { correct: false, display: text, reveal };
      }

      const b = document.createElement('div');
      b.className = "balloon floating";
      b.textContent = text;

      // 위치/속도/색
      const areaW = gameArea.clientWidth || window.innerWidth;
      const x = randInt(10, Math.max(40, areaW - 150));
      const dur = randInt(6000, 10000); // 떠내려가는 시간
      const color = BALLOON_COLORS[Math.floor(Math.random()*BALLOON_COLORS.length)];
      b.style.left = x + "px";
      b.style.background = color;
      b.style.animationDuration = dur + "ms";

      // 클릭 핸들러
      b.addEventListener('click', (ev)=>{
        ev.stopPropagation();
        handleBalloonClick(b, payload);
      }, { passive: true });

      // 애니메이션 종료 시 제거
      const removeSelf = ()=>{
        if(b.parentNode){ b.parentNode.removeChild(b); balloons.delete(b); }
      };
      b.addEventListener('animationend', removeSelf);
      b.addEventListener('webkitAnimationEnd', removeSelf);

      gameArea.appendChild(b);
      balloons.add(b);
    }

    function handleBalloonClick(el, payload){
      // 이미 팝된 경우 중복 처리 방지
      if(el.classList.contains('pop')) return;

      if(payload.correct){
        score += 10;
        scoreEl.textContent = score;
        el.style.outline = "3px solid " + getComputedStyle(document.documentElement).getPropertyValue('--correct').trim() || "#16a34a";
        showToast("+10 점! 정답 🎯", "#a7f3d0");
        el.classList.remove('floating');
        el.classList.add('pop');
        setTimeout(()=>{ if(el.parentNode){ el.parentNode.removeChild(el); balloons.delete(el);} }, 220);
      }else{
        score -= 10;
        scoreEl.textContent = score;
        // 오답 시 풍선 내 텍스트를 정답 쌍의 반대 언어로 표시
        el.textContent = payload.reveal;
        el.style.outline = "3px solid " + getComputedStyle(document.documentElement).getPropertyValue('--wrong').trim() || "#dc2626";
        showToast("-10 점… 오답 ❌", "#fecaca");
        el.classList.remove('floating');
        el.classList.add('pop');
        setTimeout(()=>{ if(el.parentNode){ el.parentNode.removeChild(el); balloons.delete(el);} }, 280);
      }
    }

    function clearBalloons(){
      for(const b of balloons){
        if(b.parentNode) b.parentNode.removeChild(b);
      }
      balloons.clear();
    }

    function startGame(){
      if(!dictionary.length){
        showToast("단어 목록을 먼저 불러오세요.");
        return;
      }
      running = true;
      score = 0;
      scoreEl.textContent = score;
      clearBalloons();
      setPrompt();

      startBtn.disabled = true;
      stopBtn.disabled = false;

      // 스폰 루프
      const spawn = ()=>{
        if(!running) return;
        // 일정 확률로 새 문제로 갱신하여 변주
        if(Math.random() < 0.22) setPrompt();
        spawnBalloon();
        const nextIn = randInt(700, 1300); // 스폰 간격
        spawnTimer = setTimeout(spawn, nextIn);
      };
      spawn();
    }

    function stopGame(){
      running = false;
      clearTimeout(spawnTimer);
      startBtn.disabled = false;
      stopBtn.disabled = true;
      clearBalloons();
      questionEl.textContent = "중지됨. 다시 시작하려면 시작 버튼을 누르세요.";
    }

    // 이벤트
    document.querySelectorAll('input[name="direction"]').forEach(r=>{
      r.addEventListener('change', (e)=>{
        direction = e.target.value;
        if(currentPrompt){
          if(direction === "en2ko") questionEl.textContent = currentPrompt.en + " → ?";
          else questionEl.textContent = currentPrompt.ko + " → ?";
        }
      });
    });

    categoryEl.addEventListener('change', async ()=>{
      stopGame();
      questionEl.textContent = "단어를 불러오는 중…";
      try{
        dictionary = await loadCategory(categoryEl.value);
        if(!dictionary.length){
          questionEl.textContent = "목록이 비어있습니다. 파일 형식을 확인하세요.";
        }else{
          questionEl.textContent = `${categoryEl.value} 단어 ${dictionary.length}개 로드됨. 시작을 누르세요.`;
        }
      }catch(err){
        console.error(err);
        questionEl.textContent = "불러오기 실패: " + err.message;
      }
    });

    startBtn.addEventListener('click', startGame);
    stopBtn.addEventListener('click', stopGame);

    // 초기 자동 로드
    (async function init(){
      try{
        questionEl.textContent = "단어 불러오는 중…";
        dictionary = await loadCategory(categoryEl.value);
        questionEl.textContent = `${categoryEl.value} 단어 ${dictionary.length}개 로드됨. 시작을 누르세요.`;
      }catch(e){
        questionEl.textContent = "단어 로드 실패. 레포가 public이고 파일 경로가 맞는지 확인해주세요.";
      }
    })();

    // 반응형: 창 크기 바뀔 때 벽 밖 스폰 방지용으로 풍선 정리
    window.addEventListener('resize', ()=>{
      // 스폰 위치 보정 위해 현재 떠있는 풍선은 제거
      clearBalloons();
    });
  </script>
</body>
</html>
