<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Vocab Balloon Quiz (TOEIC/TOEFL)</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Jua&family=Sour+Gummy:wght@400;700&display=swap" />

  <style>
    :root{
      --text: #3a3a3a;
      --correct: #16a34a;
      --wrong: #dc2626;
      --panel-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      --header-h: 58px;
      --question-top: 90px;
      --font-question: 1.35rem;
      --font-balloon: 1.10rem;
      --font-balloon-ko: 1.10rem;
    }
    *{ box-sizing:border-box; }
    html,body{
      height:100%;
      margin:0;
      font-family: "Sour Gummy", "Jua", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      color: var(--text);
    }
    body{
      background: linear-gradient(160deg, #f6e9ff, #dff7ff, #fff2cc);
      overflow:hidden;
    }
    header{
      position:fixed;
      top:10px;
      left:12px;
      right:12px;
      z-index:10;
      display:flex;
      align-items:center;
      flex-wrap:wrap;
      gap:10px 12px;
      padding:10px 14px;
      background:rgba(255, 255, 255, 0.8);
      border-radius:16px;
      box-shadow:0 8px 24px rgba(0, 0, 0, 0.08);
    }
    .brand{
      font-family: "Sour Gummy", "Jua", sans-serif;
      font-weight:700;
      font-size:0.9rem;
      color:#08324a;
    }
    .controls{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      font-size:0.9rem;
      font-weight:600;
    }
    .controls label{ font-weight:600; }
    .controls select{
      border:none;
      background:#fff;
      padding:8px 12px;
      border-radius:999px;
      font-family:inherit;
      font-size:0.9rem;
      font-weight:600;
      cursor:pointer;
      box-shadow:0 0 0 1px #e8eef5;
    }
    .controls .toggle{
      display:flex;
      gap:8px;
      align-items:center;
      background:#fff;
      border-radius:999px;
      padding:6px 10px;
      box-shadow:0 0 0 1px #e8eef5;
    }
    .controls .toggle label{
      font-weight:600;
      cursor:pointer;
    }
    .controls button{
      border:none;
      border-radius:999px;
      padding:8px 12px;
      font-family:inherit;
      font-size:0.9rem;
      font-weight:600;
      cursor:pointer;
    }
    #startBtn{ background:#7fd6ff; color:#08324a; }
    #startBtn:hover:not(:disabled){ background:#66cbfb; }
    #stopBtn,
    #exitBtn{
      background:#ffd9dd;
      color:#5c1a22;
    }
    #stopBtn:hover:not(:disabled),
    #exitBtn:hover:not(:disabled){ background:#ffc4cb; }
    .score{
      margin-left:auto;
      font-family: "Sour Gummy", sans-serif;
      font-weight:600;
      font-size:0.9rem;
      padding:6px 10px;
      border-radius:999px;
      background:#fff;
    }
    .question{
      position:fixed;
      top:var(--question-top);
      left:50%;
      transform:translateX(-50%);
      z-index:9;
      max-width:min(92vw, 720px);
      padding:10px 22px;
      text-align:center;
      font-family: "Jua", "Sour Gummy", "Apple SD Gothic Neo", sans-serif;
      font-size:var(--font-question);
      font-weight:700;
      line-height:1.35;
      color:#2d3748;
      background:rgba(255, 255, 255, 0.92);
      border:2px solid #ffdd8a;
      border-radius:16px;
      box-shadow: var(--panel-shadow);
    }
    .game-area{
      position:absolute;
      left:12px;
      right:calc(12px + min(240px, 30vw));
      top:calc(var(--question-top) + 56px);
      bottom:12px;
      overflow:hidden;
      border-radius:24px;
      background-image: url("https://raw.githubusercontent.com/active-volcano-ham/word-study/main/toeic%20toefl%20word/Quiz%20background.png");
      background-size: cover;
      background-position: center;
      box-shadow: inset 0 0 0 2px #ffffff70, 0 10px 30px rgba(0, 0, 0, 0.1);
    }
    .wrong-log{
      position:fixed;
      top:calc(var(--question-top) + 56px);
      right:12px;
      bottom:12px;
      width:min(240px, 30vw);
      z-index:8;
      display:flex;
      flex-direction:column;
      gap:8px;
      padding:10px 12px;
      background:rgba(255, 255, 255, 0.92);
      border-radius:16px;
      border:2px solid #fecaca;
      box-shadow: var(--panel-shadow);
      overflow:hidden;
    }
    .wrong-log-title{
      font-family: "Sour Gummy", sans-serif;
      font-size:0.85rem;
      font-weight:700;
      color:#5c1a22;
      flex-shrink:0;
    }
    .wrong-log-list{
      list-style:none;
      margin:0;
      padding:0;
      overflow-y:auto;
      flex:1;
      display:flex;
      flex-direction:column;
      gap:6px;
    }
    .wrong-log-list li{
      font-family: "Jua", "Apple SD Gothic Neo", sans-serif;
      font-size:0.82rem;
      line-height:1.35;
      padding:8px 10px;
      background:#fff5f5;
      border-radius:10px;
      border:1px solid #fecaca;
      word-break:keep-all;
    }
    .wrong-log-list .wl-chosen{
      display:block;
      color:#64748b;
      font-size:0.78rem;
    }
    .wrong-log-list .wl-answer{
      display:block;
      font-weight:700;
      color:#1e293b;
      margin-top:2px;
    }
    .balloon.balloon-wrong{
      animation:none !important;
      cursor:default;
      outline:3px solid var(--wrong);
      z-index:3;
    }
    .balloon.balloon-wrong .balloon-label{
      white-space:pre-line;
    }
    .balloon{
      --balloon-w: 118px;
      --balloon-h: 156px;
      --balloon-tilt: 0deg;
      position:absolute;
      top:-180px;
      width:var(--balloon-w);
      min-height:var(--balloon-h);
      max-width:min(42vw, 150px);
      padding:14px 12px 22px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-family: "Sour Gummy", "Segoe UI", sans-serif;
      font-size:var(--font-balloon);
      font-weight:700;
      line-height:1.25;
      color:#2d3748;
      z-index:2;
      border:2px solid rgba(255, 255, 255, 0.55);
      border-radius:50% 50% 48% 48% / 58% 58% 42% 42%;
      cursor:pointer;
      user-select:none;
      box-shadow:
        0 8px 18px rgba(0, 0, 0, 0.1),
        inset 0 -12px 28px rgba(0, 0, 0, 0.06),
        inset 0 12px 24px rgba(255, 255, 255, 0.42);
      transform: rotate(var(--balloon-tilt));
    }
    .balloon.balloon-ko{
      font-family: "Jua", "Apple SD Gothic Neo", sans-serif;
      font-size:var(--font-balloon-ko);
    }
    .balloon::before{
      content:"";
      position:absolute;
      top:14%;
      left:22%;
      width:26%;
      height:18%;
      border-radius:50%;
      background:rgba(255, 255, 255, 0.5);
      transform:rotate(-28deg);
      pointer-events:none;
    }
    .balloon::after{
      content:"";
      position:absolute;
      bottom:-10px;
      left:50%;
      width:10px;
      height:12px;
      margin-left:-5px;
      background:inherit;
      border-radius:0 0 50% 50%;
      box-shadow: inset 0 -2px 4px rgba(0,0,0,0.08);
      clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
      filter:brightness(0.92);
    }
    .balloon-label{
      position:relative;
      z-index:1;
      max-width:100%;
      word-break:keep-all;
      overflow-wrap:break-word;
    }
    .balloon-knot{
      position:absolute;
      bottom:-22px;
      left:50%;
      width:2px;
      height:14px;
      margin-left:-1px;
      background:rgba(80, 80, 80, 0.35);
      border-radius:2px;
      pointer-events:none;
      z-index:0;
    }
    .floating{
      animation: floatY linear forwards;
    }
    @keyframes floatY{
      from{ transform: translateY(0) rotate(var(--balloon-tilt)); }
      to{ transform: translateY(120vh) rotate(var(--balloon-tilt)); }
    }
    .pop{
      animation: pop 220ms ease-out forwards;
    }
    @keyframes pop{
      0%{ transform: scale(1) rotate(var(--balloon-tilt)); opacity:1; }
      60%{ transform: scale(1.12) rotate(var(--balloon-tilt)); opacity:0.85; }
      100%{ transform: scale(0.35) rotate(var(--balloon-tilt)); opacity:0; }
    }
    .toast{
      position:fixed;
      bottom:16px;
      left:50%;
      transform:translateX(-50%);
      background:#fff;
      border:2px solid #dce9ff;
      padding:10px 16px;
      border-radius:999px;
      box-shadow: var(--panel-shadow);
      z-index:15;
      font-family: "Jua", sans-serif;
      font-size:0.95rem;
      font-weight:700;
      display:none;
    }
    .toast.show{ display:block; }
    .legend{
      position:fixed;
      bottom:14px;
      right:14px;
      font-size:0.8rem;
      font-weight:600;
      background:rgba(255, 255, 255, 0.88);
      border-radius:12px;
      padding:6px 10px;
      box-shadow: var(--panel-shadow);
      z-index:12;
    }
    .small{ font-size:0.8rem; }
    .muted{ opacity:0.75; }
    .btn{ cursor:pointer; }
    .btn:disabled{ opacity:0.55; cursor:not-allowed; }

    @media (max-width: 720px){
      :root{ --question-top: 118px; }
      header{ top:8px; left:8px; right:8px; }
      .brand,
      .controls,
      .controls select,
      .controls button,
      .score{ font-size:0.82rem; }
      :root{
        --font-question: 1.15rem;
        --font-balloon: 0.85rem;
        --font-balloon-ko: 0.82rem;
      }
      .question{ padding:10px 16px; }
      .game-area{
        left:8px;
        right:8px;
        top:calc(var(--question-top) + 52px);
        border-radius:18px;
      }
      .wrong-log{ display:none; }
      .balloon{
        --balloon-w: 104px;
        --balloon-h: 138px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">Vocab Balloon Quiz</div>
    <div class="controls">
      <label>Category
        <select id="category">
          <option value="TOEIC">TOEIC</option>
          <option value="TOEFL">TOEFL</option>
        </select>
      </label>
      <div class="toggle" title="Question direction">
        <label><input type="radio" name="direction" value="en2ko" checked> English → Korean</label>
        <label><input type="radio" name="direction" value="ko2en"> Korean → English</label>
      </div>
      <button id="startBtn" class="btn" type="button">Start</button>
      <button id="stopBtn" class="btn" type="button" disabled>Stop</button>
      <button id="exitBtn" class="btn" type="button">Exit</button>
    </div>
    <div class="score">Score: <span id="score">0</span></div>
  </header>

  <div class="question" id="question"></div>

  <div class="game-area" id="gameArea" aria-live="polite"></div>

  <aside class="wrong-log" id="wrongLog" aria-label="Wrong answers">
    <div class="wrong-log-title">Wrong</div>
    <ul class="wrong-log-list" id="wrongLogList"></ul>
  </aside>

  <div class="toast" id="toast"></div>
  <div class="legend small muted">맞추면 +10, 오답 -10. 풍선 클릭으로 답 선택.</div>

  <script>
    const RAW_BASE =
      "https://raw.githubusercontent.com/active-volcano-ham/word-study/refs/heads/main/toeic%20toefl%20word/";
    const FILES = {
      TOEIC: "TOEIC word.json",
      TOEFL: "TOEFL word.json"
    };

    const BALLOON_COLORS = [
      "#ffb3b3","#ffc6b3","#ffd9b3","#ffecb3","#ffffb3","#ecffb3",
      "#d9ffb3","#c6ffb3","#b3ffb3","#b3ffc6","#b3ffd9","#b3ffec",
      "#b3ffff","#b3ecff","#b3d9ff","#b3c6ff","#b3b3ff","#c6b3ff",
      "#d9b3ff","#ecb3ff","#ffb3ff","#ffb3ec","#ffb3d9","#ffb3c6"
    ];

    const categoryEl = document.getElementById('category');
    const startBtn   = document.getElementById('startBtn');
    const stopBtn    = document.getElementById('stopBtn');
    const exitBtn    = document.getElementById('exitBtn');
    const gameArea   = document.getElementById('gameArea');
    const questionEl = document.getElementById('question');
    const scoreEl    = document.getElementById('score');
    const toastEl       = document.getElementById('toast');
    const wrongLogList  = document.getElementById('wrongLogList');

    let dictionary    = [];
    let direction     = "en2ko";
    let score         = 0;
    let running       = false;
    let spawnTimer    = null;
    let currentPrompt = null;
    let balloons      = new Set();

    const showToast = (msg, color) => {
      toastEl.textContent = msg;
      toastEl.style.borderColor = color || "#bee3ef";
      toastEl.classList.add('show');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toastEl.classList.remove('show'), 900);
    };

    const randInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
    const choice  = (arr) => arr.length ? arr[Math.floor(Math.random() * arr.length)] : undefined;

    function entryFromJson(item) {
      const en = String(item.Word ?? item.word ?? "").trim();
      if (!en) return null;
      let ko = item.Meaning ?? item.meaning;
      if (!ko) {
        const parts = [item["Meaning 1"], item["Meaning 2"]].filter(Boolean);
        ko = parts.join(" / ");
      }
      ko = String(ko ?? "").trim();
      if (!ko) return null;
      return { en, ko };
    }

    function parseWordJson(text) {
      const data = JSON.parse(text);
      if (!Array.isArray(data)) throw new Error("JSON 형식이 올바르지 않습니다 (배열 필요).");
      const entries = [];
      for (const item of data) {
        const e = entryFromJson(item);
        if (e && e.en && e.ko) entries.push(e);
      }
      const seen = new Set();
      const uniq = [];
      for (const e of entries) {
        const k = (e.en + "|" + e.ko).toLowerCase();
        if (!seen.has(k)) { seen.add(k); uniq.push(e); }
      }
      return uniq;
    }

    async function fetchWordJson(url) {
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error(`${url} → HTTP ${res.status}`);
      return parseWordJson(await res.text());
    }

    async function loadCategory(cat) {
      const fileName = FILES[cat];
      if (!fileName) throw new Error("알 수 없는 카테고리: " + cat);
      const urls = [
        RAW_BASE + encodeURIComponent(fileName),
        "./" + encodeURI(fileName)
      ];
      const errors = [];
      for (const url of urls) {
        try { return await fetchWordJson(url); }
        catch (err) { errors.push(err.message || String(err)); }
      }
      throw new Error("단어 파일을 불러오지 못했습니다. — " + errors.join(" | "));
    }

    function setPrompt() {
      if (!dictionary.length) {
        questionEl.textContent = "";
        currentPrompt = null;
        return null;
      }
      currentPrompt = choice(dictionary);
      if (!currentPrompt) return null;
      if (direction === "en2ko") questionEl.textContent = currentPrompt.en + " → ?";
      else                       questionEl.textContent = currentPrompt.ko + " → ?";
      return currentPrompt;
    }

    function clearWrongLog() {
      wrongLogList.innerHTML = "";
    }

    function addWrongLogEntry(clicked, reveal) {
      const li = document.createElement("li");
      const chosen = document.createElement("span");
      chosen.className = "wl-chosen";
      chosen.textContent = clicked;
      const answer = document.createElement("span");
      answer.className = "wl-answer";
      answer.textContent = "→ " + reveal;
      li.appendChild(chosen);
      li.appendChild(answer);
      wrongLogList.appendChild(li);
      li.scrollIntoView({ block: "nearest", behavior: "smooth" });
    }

    function resetSession() {
      running = false;
      clearTimeout(spawnTimer);
      score = 0;
      scoreEl.textContent = "0";
      currentPrompt = null;
      clearBalloons();
      clearWrongLog();
      startBtn.disabled = false;
      stopBtn.disabled = true;
      questionEl.textContent = "";
    }

    function spawnBalloon() {
      if (!running || !currentPrompt) return;
      const isCorrect = Math.random() < 0.34;
      let text, payload;
      if (isCorrect) {
        text = (direction === "en2ko") ? currentPrompt.ko : currentPrompt.en;
        payload = { correct: true, display: text, reveal: text };
      } else {
        let wrong = choice(dictionary);
        for (let i = 0; i < 5 && wrong && wrong.en === currentPrompt.en && wrong.ko === currentPrompt.ko; i++)
          wrong = choice(dictionary);
        if (!wrong) wrong = currentPrompt;
        text = (direction === "en2ko") ? wrong.ko : wrong.en;
        const reveal = (direction === "en2ko") ? wrong.en : wrong.ko;
        payload = { correct: false, display: text, reveal };
      }

      const b = document.createElement('div');
      const isKorean = /[가-힣]/.test(text);
      b.className = "balloon floating" + (isKorean ? " balloon-ko" : "");

      const label = document.createElement('span');
      label.className = "balloon-label";
      label.textContent = text;
      b.appendChild(label);

      const knot = document.createElement('span');
      knot.className = "balloon-knot";
      knot.setAttribute("aria-hidden", "true");
      b.appendChild(knot);

      const areaW   = gameArea.clientWidth || window.innerWidth;
      const balloonW = 118;
      const x    = randInt(8, Math.max(24, areaW - balloonW - 8));
      const dur  = randInt(8000, 12000);
      const color = BALLOON_COLORS[Math.floor(Math.random() * BALLOON_COLORS.length)];
      const tilt  = randInt(-14, 14);
      b.style.left = x + "px";
      b.style.background = color;
      b.style.setProperty("--balloon-tilt", tilt + "deg");
      b.style.animationDuration = dur + "ms";

      b.addEventListener('click', (ev) => {
        ev.stopPropagation();
        handleBalloonClick(b, payload);
      }, { passive: true });

      const removeSelf = () => {
        if (b.dataset.answered === "wrong") return;
        if (b.parentNode) { b.parentNode.removeChild(b); balloons.delete(b); }
      };
      b.addEventListener('animationend', removeSelf);
      b.addEventListener('webkitAnimationEnd', removeSelf);

      gameArea.appendChild(b);
      balloons.add(b);
    }

    function handleBalloonClick(el, payload) {
      if (el.classList.contains('pop') || el.dataset.answered === "wrong") return;
      if (payload.correct) {
        score += 10;
        scoreEl.textContent = score;
        showToast("+10", "#a7f3d0");
        el.classList.remove('floating');
        el.classList.add('pop');
        setTimeout(() => { if (el.parentNode) { el.parentNode.removeChild(el); balloons.delete(el); } }, 220);
      } else {
        score -= 10;
        scoreEl.textContent = score;
        el.dataset.answered = "wrong";
        el.classList.remove('floating');
        el.classList.add('balloon-wrong');
        const lbl = el.querySelector(".balloon-label");
        const balloonText = payload.display + "\n→ " + payload.reveal;
        if (lbl) lbl.textContent = balloonText;
        addWrongLogEntry(payload.display, payload.reveal);
        showToast("-10", "#fecaca");
      }
    }

    function clearBalloons() {
      for (const b of balloons) if (b.parentNode) b.parentNode.removeChild(b);
      balloons.clear();
    }

    function startGame() {
      if (!dictionary.length) { showToast("Load words first."); return; }
      running = true;
      score   = 0;
      scoreEl.textContent = score;
      clearBalloons();
      setPrompt();
      startBtn.disabled = true;
      stopBtn.disabled  = false;
      const spawn = () => {
        if (!running) return;
        if (Math.random() < 0.22) setPrompt();
        spawnBalloon();
        spawnTimer = setTimeout(spawn, randInt(1000, 2500));
      };
      spawn();
    }

    function stopGame() {
      running = false;
      clearTimeout(spawnTimer);
      startBtn.disabled = false;
      stopBtn.disabled  = true;
      clearBalloons();
      if (currentPrompt) {
        if (direction === "en2ko") questionEl.textContent = currentPrompt.en + " → ?";
        else                       questionEl.textContent = currentPrompt.ko + " → ?";
      } else if (dictionary.length) setPrompt();
    }

    document.querySelectorAll('input[name="direction"]').forEach(r => {
      r.addEventListener('change', (e) => {
        direction = e.target.value;
        if (currentPrompt) {
          if (direction === "en2ko") questionEl.textContent = currentPrompt.en + " → ?";
          else                       questionEl.textContent = currentPrompt.ko + " → ?";
        }
      });
    });

    categoryEl.addEventListener('change', async () => {
      const wasRunning = running;
      stopGame();
      questionEl.textContent = "";
      try {
        dictionary = await loadCategory(categoryEl.value);
        if (dictionary.length) setPrompt();
        else questionEl.textContent = "";
      } catch (err) {
        console.error(err);
        dictionary = [];
        questionEl.textContent = "";
        showToast("Load failed", "#fecaca");
      }
      if (wasRunning) startGame();
    });

    startBtn.addEventListener('click', startGame);
    stopBtn.addEventListener('click', stopGame);
    exitBtn.addEventListener('click', () => {
      resetSession();
      window.location.href = '../index.html';
    });

    (async function init() {
      questionEl.textContent = "";
      try {
        dictionary = await loadCategory(categoryEl.value);
        if (dictionary.length) setPrompt();
      } catch (e) {
        console.error(e);
        dictionary = [];
      }
    })();

    window.addEventListener('resize', () => { clearBalloons(); });
  </script>
</body>
</html>
