<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>영단어 풍선 퀴즈 (TOEIC/TOEFL)</title>
  <meta name="theme-color" content="#9fe7f6" />
  <meta name="description" content="TOEIC/TOEFL 단어 풍선 퀴즈 게임" />
  <!-- PWA 최소 매니페스트를 인라인 -->
  <link rel="manifest" href="data:application/manifest+json,{&quot;name&quot;:%22Balloon%20Vocab%20Quiz%22,&quot;short_name&quot;:%22VocabQuiz%22,&quot;display&quot;:%22standalone&quot;,&quot;background_color&quot;:%22#9fe7f680%22,&quot;theme_color&quot;:%22#9fe7f6&quot;}" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Jua&family=Sour+Gummy:wght@400;700&display=swap" />

  <style>
    :root{
      --text: #3a3a3a;
      --correct: #16a34a;
      --wrong: #dc2626;
      --panel-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      --header-h: 58px;
      --question-top: 72px;
    }
    *{ box-sizing:border-box; }
    html,body{
      height:100%;
      margin:0;
      font-family: "Sour Gummy", "Jua", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      color: var(--text);
    }
    body{
      background: linear-gradient(160deg, #f6e9ff, #dff7ff, #fff2cc);
      overflow:hidden;
    }
    header{
      position:fixed;
      top:10px;
      left:12px;
      right:12px;
      z-index:10;
      display:flex;
      align-items:center;
      flex-wrap:wrap;
      gap:10px 12px;
      padding:10px 14px;
      background: rgba(255, 255, 255, 0.85);
      border-radius:16px;
      box-shadow: var(--panel-shadow);
    }
    .brand{
      font-family: "Sour Gummy", "Jua", sans-serif;
      font-weight:700;
      font-size:1.05rem;
      color:#08324a;
    }
    .controls{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
      font-size:0.92rem;
      font-weight:600;
    }
    .controls label{ font-weight:600; }
    .controls select{
      border:2px solid #dce9ff;
      background:#fff;
      padding:7px 12px;
      border-radius:999px;
      font-family:inherit;
      font-size:0.92rem;
      font-weight:600;
      cursor:pointer;
    }
    .controls .toggle{
      display:flex;
      gap:8px;
      align-items:center;
      background:#fff;
      border:2px solid #dce9ff;
      border-radius:999px;
      padding:6px 12px;
    }
    .controls .toggle label{
      font-weight:600;
      cursor:pointer;
    }
    .controls button{
      border:none;
      border-radius:999px;
      padding:8px 14px;
      font-family:inherit;
      font-size:0.92rem;
      font-weight:700;
      cursor:pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.06);
    }
    #startBtn{
      background:#7fd6ff;
      color:#08324a;
    }
    #startBtn:hover:not(:disabled){ background:#66cbfb; }
    #stopBtn{
      background:#ffd9dd;
      color:#5c1a22;
    }
    #stopBtn:hover:not(:disabled){ background:#ffc4cb; }
    .score{
      margin-left:auto;
      font-family: "Sour Gummy", sans-serif;
      font-weight:700;
      font-size:0.95rem;
      padding:6px 12px;
      border-radius:999px;
      background:#fff;
      border:2px solid #dce9ff;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }
    .question{
      position:fixed;
      top:var(--question-top);
      left:50%;
      transform:translateX(-50%);
      z-index:9;
      max-width:min(92vw, 720px);
      padding:12px 22px;
      text-align:center;
      font-family: "Jua", "Sour Gummy", "Apple SD Gothic Neo", sans-serif;
      font-size:1.35rem;
      font-weight:700;
      line-height:1.35;
      color:#2d3748;
      background:rgba(255, 255, 255, 0.92);
      border:2px solid #ffdd8a;
      border-radius:16px;
      box-shadow: var(--panel-shadow);
    }
    .game-area{
      position:absolute;
      left:12px;
      right:12px;
      top:calc(var(--question-top) + 56px);
      bottom:12px;
      overflow:hidden;
      border-radius:24px;
      background-color:#dff3ff;
      background-image:
        linear-gradient(180deg, rgba(255, 255, 255, 0.32), rgba(255, 255, 255, 0.18)),
        linear-gradient(180deg, #c7f0ff, #f9fbff 52%, #ffeccc);
      box-shadow: inset 0 0 0 2px #ffffff70, 0 10px 30px rgba(0, 0, 0, 0.1);
    }
    .balloon{
      --balloon-w: 118px;
      --balloon-h: 156px;
      --balloon-tilt: 0deg;
      position:absolute;
      top:-180px;
      width:var(--balloon-w);
      min-height:var(--balloon-h);
      max-width:min(42vw, 150px);
      padding:14px 12px 22px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-family: "Sour Gummy", "Segoe UI", sans-serif;
      font-size:0.95rem;
      font-weight:700;
      line-height:1.25;
      color:#2d3748;
      border:2px solid rgba(255, 255, 255, 0.55);
      border-radius:50% 50% 48% 48% / 58% 58% 42% 42%;
      cursor:pointer;
      user-select:none;
      box-shadow:
        0 8px 18px rgba(0, 0, 0, 0.1),
        inset 0 -12px 28px rgba(0, 0, 0, 0.06),
        inset 0 12px 24px rgba(255, 255, 255, 0.42);
      transform: rotate(var(--balloon-tilt));
    }
    .balloon.balloon-ko{
      font-family: "Jua", "Apple SD Gothic Neo", sans-serif;
      font-size:0.9rem;
    }
    .balloon::before{
      content:"";
      position:absolute;
      top:14%;
      left:22%;
      width:26%;
      height:18%;
      border-radius:50%;
      background:rgba(255, 255, 255, 0.5);
      transform:rotate(-28deg);
      pointer-events:none;
    }
    .balloon::after{
      content:"";
      position:absolute;
      bottom:-10px;
      left:50%;
      width:10px;
      height:12px;
      margin-left:-5px;
      background:inherit;
      border-radius:0 0 50% 50%;
      box-shadow: inset 0 -2px 4px rgba(0,0,0,0.08);
      clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
      filter:brightness(0.92);
    }
    .balloon-label{
      position:relative;
      z-index:1;
      max-width:100%;
      word-break:keep-all;
      overflow-wrap:break-word;
    }
    .balloon-knot{
      position:absolute;
      bottom:-22px;
      left:50%;
      width:2px;
      height:14px;
      margin-left:-1px;
      background:rgba(80, 80, 80, 0.35);
      border-radius:2px;
      pointer-events:none;
      z-index:0;
    }
    .floating{
      animation: floatY linear forwards;
    }
    @keyframes floatY{
      from{ transform: translateY(0) rotate(var(--balloon-tilt)); }
      to{ transform: translateY(120vh) rotate(var(--balloon-tilt)); }
    }
    .pop{
      animation: pop 220ms ease-out forwards;
    }
    @keyframes pop{
      0%{ transform: scale(1) rotate(var(--balloon-tilt)); opacity:1; }
      60%{ transform: scale(1.12) rotate(var(--balloon-tilt)); opacity:0.85; }
      100%{ transform: scale(0.35) rotate(var(--balloon-tilt)); opacity:0; }
    }
    .toast{
      position:fixed;
      bottom:16px;
      left:50%;
      transform:translateX(-50%);
      background:#fff;
      border:2px solid #dce9ff;
      padding:10px 16px;
      border-radius:999px;
      box-shadow: var(--panel-shadow);
      z-index:15;
      font-family: "Jua", sans-serif;
      font-size:0.95rem;
      font-weight:700;
      display:none;
    }
    .toast.show{ display:block; }
    .legend{
      position:fixed;
      bottom:14px;
      right:14px;
      font-size:0.8rem;
      font-weight:600;
      background:rgba(255, 255, 255, 0.88);
      border-radius:12px;
      padding:6px 10px;
      box-shadow: var(--panel-shadow);
      z-index:12;
    }
    .small{ font-size:0.8rem; }
    .muted{ opacity:0.75; }
    .btn{ cursor:pointer; }
    .btn:disabled{ opacity:0.55; cursor:not-allowed; }

    @media (max-width: 720px){
      :root{ --question-top: 118px; }
      header{ top:8px; left:8px; right:8px; }
      .brand{ font-size:0.98rem; }
      .question{ font-size:1.15rem; padding:10px 16px; }
      .game-area{
        left:8px;
        right:8px;
        top:calc(var(--question-top) + 52px);
        border-radius:18px;
      }
      .balloon{
        --balloon-w: 104px;
        --balloon-h: 138px;
        font-size:0.85rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">영단어 풍선 퀴즈</div>
    <div class="controls">
      <label>카테고리
        <select id="category">
          <option value="TOEIC">TOEIC</option>
          <option value="TOEFL">TOEFL</option>
        </select>
      </label>

      <div class="toggle" title="문제 방향">
        <label><input type="radio" name="direction" value="en2ko" checked> 영어 → 한국어</label>
        <label><input type="radio" name="direction" value="ko2en"> 한국어 → 영어</label>
      </div>

      <button id="startBtn" class="btn primary-btn">시작</button>
      <button id="stopBtn" class="btn danger-btn" disabled>정지</button>
    </div>

    <div class="score">점수: <span id="score">0</span></div>
  </header>

  <div class="question" id="question">상단에서 옵션을 선택하고 시작을 누르세요.</div>

  <div class="game-area" id="gameArea" aria-live="polite"></div>

  <div class="toast" id="toast"></div>

  <div class="legend small muted">맞추면 +10, 오답 -10. 풍선 클릭으로 답 선택. 단어는 GitHub JSON에서 로드(실패 시 같은 폴더 JSON).</div>

  <script>
    // 설정
    const RAW_BASE =
      "https://raw.githubusercontent.com/active-volcano-ham/word-study/refs/heads/main/toeic%20toefl%20word/";
    const FILES = {
      TOEIC: "TOEIC word.json",
      TOEFL: "TOEFL word.json"
    };

    // 풍선 색상 팔레트 (사용자 지정)
    const BALLOON_COLORS = [
      "#ffb3b3", "#ffc6b3", "#ffd9b3", "#ffecb3", "#ffffb3", "#ecffb3",
      "#d9ffb3", "#c6ffb3", "#b3ffb3", "#b3ffc6", "#b3ffd9", "#b3ffec",
      "#b3ffff", "#b3ecff", "#b3d9ff", "#b3c6ff", "#b3b3ff", "#c6b3ff",
      "#d9b3ff", "#ecb3ff", "#ffb3ff", "#ffb3ec", "#ffb3d9", "#ffb3c6", "#ffb3b3"
    ];

    // DOM
    const categoryEl = document.getElementById('category');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const gameArea = document.getElementById('gameArea');
    const questionEl = document.getElementById('question');
    const scoreEl = document.getElementById('score');
    const toastEl = document.getElementById('toast');

    // 상태
    let dictionary = [];     // [{en, ko}]
    let direction = "en2ko"; // 문제 방향
    let score = 0;
    let running = false;
    let spawnTimer = null;
    let currentPrompt = null; // {en, ko}
    let balloons = new Set();

    // 유틸
    const showToast = (msg, color) => {
      toastEl.textContent = msg;
      toastEl.style.borderColor = color || "#bee3ef";
      toastEl.classList.add('show');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(()=>toastEl.classList.remove('show'), 900);
    };

    const randInt = (min, max) => Math.floor(Math.random()*(max-min+1))+min;
    const choice = (arr) => arr.length ? arr[Math.floor(Math.random()*arr.length)] : undefined;
    const shuffle = (arr) => {
      const a = arr.slice();
      for(let i=a.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [a[i],a[j]]=[a[j],a[i]];
      }
      return a;
    };

    function entryFromJson(item){
      const en = String(item.Word ?? item.word ?? "").trim();
      if(!en) return null;
      let ko = item.Meaning ?? item.meaning;
      if(!ko){
        const parts = [item["Meaning 1"], item["Meaning 2"]].filter(Boolean);
        ko = parts.join(" / ");
      }
      ko = String(ko ?? "").trim();
      if(!ko) return null;
      return { en, ko };
    }

    function parseWordJson(text){
      const data = JSON.parse(text);
      if(!Array.isArray(data)){
        throw new Error("JSON 형식이 올바르지 않습니다 (배열 필요).");
      }
      const entries = [];
      for(const item of data){
        const e = entryFromJson(item);
        if(e && e.en && e.ko) entries.push(e);
      }
      const seen = new Set();
      const uniq = [];
      for(const e of entries){
        const k = (e.en + "|" + e.ko).toLowerCase();
        if(!seen.has(k)){ seen.add(k); uniq.push(e); }
      }
      return uniq;
    }

    async function fetchWordJson(url){
      const res = await fetch(url, { cache: "no-store" });
      if(!res.ok){
        throw new Error(`${url} → HTTP ${res.status}`);
      }
      return parseWordJson(await res.text());
    }

    async function loadCategory(cat){
      const fileName = FILES[cat];
      if(!fileName) throw new Error("알 수 없는 카테고리: " + cat);

      const urls = [
        RAW_BASE + encodeURIComponent(fileName),
        "./" + encodeURI(fileName)
      ];
      const errors = [];
      for(const url of urls){
        try{
          return await fetchWordJson(url);
        }catch(err){
          errors.push(err.message || String(err));
        }
      }
      throw new Error(
        "단어 파일을 불러오지 못했습니다. 시도: " + urls.join(", ") +
        " — " + errors.join(" | ")
      );
    }

    // 문제 갱신: 상단에 제시어 업데이트
    function setPrompt(){
      if(!dictionary.length) return null;
      currentPrompt = choice(dictionary);
      if(!currentPrompt) return null;

      if(direction === "en2ko"){
        questionEl.textContent = currentPrompt.en + " → ?";
      }else{
        questionEl.textContent = currentPrompt.ko + " → ?";
      }
      return currentPrompt;
    }

    // 풍선 생성
    function spawnBalloon(){
      if(!running || !currentPrompt) return;

      // 정답 여부를 확률적으로 분배 (정답 1/3 정도)
      const isCorrect = Math.random() < 0.34;
      let text, payload;
      if(isCorrect){
        text = (direction === "en2ko") ? currentPrompt.ko : currentPrompt.en;
        payload = { correct: true, display: text, reveal: text };
      }else{
        // 오답 단어 하나
        let wrong = choice(dictionary);
        // 현재 정답과 겹치지 않게 몇 번 시도
        for(let i=0;i<5 && wrong && wrong.en===currentPrompt.en && wrong.ko===currentPrompt.ko;i++){
          wrong = choice(dictionary);
        }
        if(!wrong) wrong = currentPrompt; // 막다른 경우
        text = (direction === "en2ko") ? wrong.ko : wrong.en;

        // 오답 클릭 시 한국어(영어) 노출: "정답 방향의 반대 언어"가 아니라, 문제의 반대편 언어를 보여준다.
        // 문제 제시가 en이면 풍선에 적힌 건 ko, 오답 클릭 시 그 ko에 대응하는 en을 보여준다(또는 반대).
        const reveal = (direction === "en2ko") ? wrong.en : wrong.ko;
        payload = { correct: false, display: text, reveal };
      }

      const b = document.createElement('div');
      const isKorean = /[가-힣]/.test(text);
      b.className = "balloon floating" + (isKorean ? " balloon-ko" : "");

      const label = document.createElement('span');
      label.className = "balloon-label";
      label.textContent = text;
      b.appendChild(label);

      const knot = document.createElement('span');
      knot.className = "balloon-knot";
      knot.setAttribute("aria-hidden", "true");
      b.appendChild(knot);

      // 위치/속도/색 (달걀형 풍선 크기에 맞춤)
      const areaW = gameArea.clientWidth || window.innerWidth;
      const balloonW = 118;
      const x = randInt(8, Math.max(24, areaW - balloonW - 8));
      const dur = randInt(6000, 10000);
      const color = BALLOON_COLORS[Math.floor(Math.random()*BALLOON_COLORS.length)];
      const tilt = randInt(-14, 14);
      b.style.left = x + "px";
      b.style.background = color;
      b.style.setProperty("--balloon-tilt", tilt + "deg");
      b.style.animationDuration = dur + "ms";

      // 클릭 핸들러
      b.addEventListener('click', (ev)=>{
        ev.stopPropagation();
        handleBalloonClick(b, payload);
      }, { passive: true });

      // 애니메이션 종료 시 제거
      const removeSelf = ()=>{
        if(b.parentNode){ b.parentNode.removeChild(b); balloons.delete(b); }
      };
      b.addEventListener('animationend', removeSelf);
      b.addEventListener('webkitAnimationEnd', removeSelf);

      gameArea.appendChild(b);
      balloons.add(b);
    }

    function handleBalloonClick(el, payload){
      // 이미 팝된 경우 중복 처리 방지
      if(el.classList.contains('pop')) return;

      if(payload.correct){
        score += 10;
        scoreEl.textContent = score;
        el.style.outline = "3px solid " + getComputedStyle(document.documentElement).getPropertyValue('--correct').trim() || "#16a34a";
        showToast("+10 점! 정답 🎯", "#a7f3d0");
        el.classList.remove('floating');
        el.classList.add('pop');
        setTimeout(()=>{ if(el.parentNode){ el.parentNode.removeChild(el); balloons.delete(el);} }, 220);
      }else{
        score -= 10;
        scoreEl.textContent = score;
        // 오답 시 풍선 내 텍스트를 정답 쌍의 반대 언어로 표시
        const lbl = el.querySelector(".balloon-label");
        if(lbl) lbl.textContent = payload.reveal;
        else el.textContent = payload.reveal;
        el.style.outline = "3px solid " + getComputedStyle(document.documentElement).getPropertyValue('--wrong').trim() || "#dc2626";
        showToast("-10 점… 오답 ❌", "#fecaca");
        el.classList.remove('floating');
        el.classList.add('pop');
        setTimeout(()=>{ if(el.parentNode){ el.parentNode.removeChild(el); balloons.delete(el);} }, 280);
      }
    }

    function clearBalloons(){
      for(const b of balloons){
        if(b.parentNode) b.parentNode.removeChild(b);
      }
      balloons.clear();
    }

    function startGame(){
      if(!dictionary.length){
        showToast("단어 목록을 먼저 불러오세요.");
        return;
      }
      running = true;
      score = 0;
      scoreEl.textContent = score;
      clearBalloons();
      setPrompt();

      startBtn.disabled = true;
      stopBtn.disabled = false;

      // 스폰 루프
      const spawn = ()=>{
        if(!running) return;
        // 일정 확률로 새 문제로 갱신하여 변주
        if(Math.random() < 0.22) setPrompt();
        spawnBalloon();
        const nextIn = randInt(700, 1300); // 스폰 간격
        spawnTimer = setTimeout(spawn, nextIn);
      };
      spawn();
    }

    function stopGame(){
      running = false;
      clearTimeout(spawnTimer);
      startBtn.disabled = false;
      stopBtn.disabled = true;
      clearBalloons();
      questionEl.textContent = "중지됨. 다시 시작하려면 시작 버튼을 누르세요.";
    }

    // 이벤트
    document.querySelectorAll('input[name="direction"]').forEach(r=>{
      r.addEventListener('change', (e)=>{
        direction = e.target.value;
        if(currentPrompt){
          if(direction === "en2ko") questionEl.textContent = currentPrompt.en + " → ?";
          else questionEl.textContent = currentPrompt.ko + " → ?";
        }
      });
    });

    categoryEl.addEventListener('change', async ()=>{
      stopGame();
      questionEl.textContent = "단어를 불러오는 중…";
      try{
        dictionary = await loadCategory(categoryEl.value);
        if(!dictionary.length){
          questionEl.textContent = "목록이 비어있습니다. 파일 형식을 확인하세요.";
        }else{
          questionEl.textContent = `${categoryEl.value} 단어 ${dictionary.length}개 로드됨. 시작을 누르세요.`;
        }
      }catch(err){
        console.error(err);
        questionEl.textContent = "불러오기 실패: " + err.message;
      }
    });

    startBtn.addEventListener('click', startGame);
    stopBtn.addEventListener('click', stopGame);

    // 초기 자동 로드
    (async function init(){
      try{
        questionEl.textContent = "단어 불러오는 중…";
        dictionary = await loadCategory(categoryEl.value);
        questionEl.textContent = `${categoryEl.value} 단어 ${dictionary.length}개 로드됨. 시작을 누르세요.`;
      }catch(e){
        questionEl.textContent = "단어 로드 실패. 레포가 public이고 파일 경로가 맞는지 확인해주세요.";
      }
    })();

    // 반응형: 창 크기 바뀔 때 벽 밖 스폰 방지용으로 풍선 정리
    window.addEventListener('resize', ()=>{
      // 스폰 위치 보정 위해 현재 떠있는 풍선은 제거
      clearBalloons();
    });
  </script>
</body>
