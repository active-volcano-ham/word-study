<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="manifest" href="./manifest.json">
  <title>Word Study</title>
  <meta name="description" content="Kids Typing Game · TOEIC/TOEFL Quiz" />
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: #e8e4dc;
    }
    .landing {
      position: relative;
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      line-height: 0;
    }
    .landing img {
      width: 100%;
      height: auto;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }
    .circle-link {
      position: absolute;
      top: 50%;
      width: 39%;
      aspect-ratio: 1;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      cursor: pointer;
      text-decoration: none;
      /* 디버그 시 outline: 2px dashed rgba(255,0,0,0.4); */
    }
    .circle-link:focus-visible {
      outline: 3px solid #4dabf7;
      outline-offset: 4px;
    }
    .circle-link:hover {
      background: rgba(255, 255, 255, 0.12);
    }
    .circle-link:active {
      background: rgba(255, 255, 255, 0.2);
    }
    .circle-link--kids {
      left: 25%;
    }
    .circle-link--quiz {
      left: 75%;
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <main class="landing">
    <!-- ▼ width/height 고정값 제거 → 모바일 반응형 -->
    <img
      src="AI Image-main.png"
      alt="Word Study — Kids Typing Game and TOEIC TOEFL Quiz"
    />
    <a
      class="circle-link circle-link--kids"
      href="kids-typing-game/kids%20game.html"
      title="Typing Game for Kids"
    >
      <span class="sr-only">Typing Game for Kids</span>
    </a>
    <a
      class="circle-link circle-link--quiz"
      href="toeic%20toefl%20word/TOEIC%20TOEFL%20Quiz.html"
      title="TOEIC / TOEFL Quiz"
    >
      <span class="sr-only">TOEIC / TOEFL Quiz</span>
    </a>
  </main>

  <!-- ▼ Service Worker 등록 (PWA용) -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.error('SW error:', err));
      });
    }
  </script>
</body>
</html>
